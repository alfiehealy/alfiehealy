<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-l" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#eaeef2" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="clip-l">
      <rect width="900" height="180" rx="6"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-l)">
    <rect width="900" height="180" fill="#ffffff"/>
    <rect width="900" height="180" fill="url(#grid-l)"/>
    <rect width="900" height="180" fill="url(#fade-l)"/>
  </g>

  <rect x="0.5" y="0.5" width="899" height="179" rx="6" fill="none" stroke="#d0d7de" stroke-width="1"/>

  <text x="40" y="72" font-family="Consolas, 'SFMono-Regular', Menlo, monospace" font-size="15">
